<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Twister Caller</title>
<style>
  :root {
    --red: #e63946;
    --blue: #1d6fe0;
    --yellow: #f4c20d;
    --green: #2a9d57;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #222;
    color: #fff;
    transition: background-color 0.4s ease;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #stage {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    gap: 24px;
  }

  #combo {
    animation: pop 0.35s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  #figure {
    height: min(42vh, 280px);
    width: auto;
    overflow: visible;
  }

  .limbIcon {
    fill: rgba(255,255,255,0.3);
    stroke: rgba(255,255,255,0.7);
    stroke-width: 3;
    transition: fill 0.2s ease, stroke 0.2s ease;
  }

  .limbEmoji {
    font-size: 30px;
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0.55;
    transition: opacity 0.2s ease;
  }

  .limbIcon.active {
    fill: #ffffff;
    stroke: #222;
    stroke-width: 4;
    transform-box: fill-box;
    transform-origin: center;
    animation: limbPulse 0.9s ease-in-out infinite;
  }

  .limbEmoji.active {
    opacity: 1;
  }

  @keyframes limbPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px #fff); }
    50% { transform: scale(1.18); filter: drop-shadow(0 0 14px #fff); }
  }

  #bodyPart {
    font-size: 9vw;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 4px 12px rgba(0,0,0,0.35);
    letter-spacing: 2px;
  }

  #colorName {
    font-size: 7vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 6px;
    opacity: 0.95;
  }

  #idleMessage {
    font-size: 6vw;
    font-weight: 700;
    opacity: 0.85;
    max-width: 80vw;
  }

  #timer {
    font-size: 8vw;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    opacity: 0.9;
    min-height: 1.2em;
  }

  #controls {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    background: rgba(0,0,0,0.25);
  }

  button {
    font-family: inherit;
    font-size: 5vw;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    padding: 18px 26px;
    cursor: pointer;
    color: #fff;
    background: #444;
    transition: transform 0.1s ease, background 0.2s ease;
    touch-action: manipulation;
  }

  button:active {
    transform: scale(0.94);
  }

  #toggleBtn {
    background: #2a9d57;
    min-width: 160px;
  }

  #toggleBtn.running {
    background: #b3261e;
  }

  .speedBtn {
    background: #555;
  }

  .speedBtn.active {
    background: #1d6fe0;
  }

  #voiceBtn {
    background: #555;
  }

  #voiceBtn.active {
    background: #8e44ad;
  }

  @media (min-width: 700px) {
    #bodyPart { font-size: 8vw; }
    #colorName { font-size: 4vw; }
    #idleMessage { font-size: 3.5vw; }
    #timer { font-size: 4vw; }
    button { font-size: 22px; }
  }
</style>
</head>
<body>

  <div id="stage">
    <div id="idleMessage">Press Start to play Twister!</div>
    <div id="combo" style="display:none;">
      <svg id="figure" viewBox="0 0 200 260">
        <circle cx="100" cy="30" r="18" fill="#fff" opacity="0.85"/>
        <line x1="100" y1="48" x2="100" y2="170" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
        <line x1="100" y1="75" x2="40" y2="75" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
        <line x1="100" y1="75" x2="160" y2="75" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
        <line x1="100" y1="170" x2="65" y2="235" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
        <line x1="100" y1="170" x2="135" y2="235" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.85"/>

        <circle class="limbIcon" data-limb="Left Hand" cx="40" cy="75" r="24"/>
        <text class="limbEmoji" data-limb="Left Hand" x="40" y="76">✋</text>

        <circle class="limbIcon" data-limb="Right Hand" cx="160" cy="75" r="24"/>
        <text class="limbEmoji" data-limb="Right Hand" x="160" y="76">✋</text>

        <circle class="limbIcon" data-limb="Left Foot" cx="65" cy="235" r="24"/>
        <text class="limbEmoji" data-limb="Left Foot" x="65" y="236">🦶</text>

        <circle class="limbIcon" data-limb="Right Foot" cx="135" cy="235" r="24"/>
        <text class="limbEmoji" data-limb="Right Foot" x="135" y="236">🦶</text>
      </svg>
      <div id="bodyPart">RIGHT HAND</div>
      <div id="colorName">red</div>
    </div>
    <div id="timer"></div>
  </div>

  <div id="controls">
    <button id="toggleBtn">Start</button>
    <button class="speedBtn" data-seconds="15">Slow (15s)</button>
    <button class="speedBtn active" data-seconds="10">Normal (10s)</button>
    <button class="speedBtn" data-seconds="5">Fast (5s)</button>
    <button id="voiceBtn" class="active">🔊 Voice On</button>
  </div>

<script>
  const COLORS = [
    { name: "red", hex: "#e63946" },
    { name: "blue", hex: "#1d6fe0" },
    { name: "yellow", hex: "#f4c20d" },
    { name: "green", hex: "#2a9d57" }
  ];
  const BODY_PARTS = ["Left Hand", "Right Hand", "Left Foot", "Right Foot"];

  const body = document.body;
  const idleMessage = document.getElementById("idleMessage");
  const combo = document.getElementById("combo");
  const bodyPartEl = document.getElementById("bodyPart");
  const colorNameEl = document.getElementById("colorName");
  const timerEl = document.getElementById("timer");
  const toggleBtn = document.getElementById("toggleBtn");
  const speedBtns = document.querySelectorAll(".speedBtn");
  const voiceBtn = document.getElementById("voiceBtn");

  let intervalSeconds = 10;
  let secondsLeft = intervalSeconds;
  let tickHandle = null;
  let running = false;
  let voiceEnabled = "speechSynthesis" in window;

  function pickRandom(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function speak(text) {
    if (!voiceEnabled || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.85;
    window.speechSynthesis.speak(utter);
  }

  function showNewCombo() {
    const color = pickRandom(COLORS);
    const part = pickRandom(BODY_PARTS);

    body.style.backgroundColor = color.hex;
    bodyPartEl.textContent = part.toUpperCase();
    colorNameEl.textContent = color.name;

    document.querySelectorAll(".limbIcon, .limbEmoji").forEach(el => {
      el.classList.toggle("active", el.dataset.limb === part);
    });

    combo.style.display = "none";
    void combo.offsetWidth;
    combo.style.display = "block";

    speak(color.name + ", " + part);
  }

  function tick() {
    secondsLeft -= 1;
    if (secondsLeft <= 0) {
      showNewCombo();
      secondsLeft = intervalSeconds;
    }
    timerEl.textContent = "Next change in " + secondsLeft + "s";
  }

  function startGame() {
    running = true;
    toggleBtn.textContent = "Pause";
    toggleBtn.classList.add("running");
    idleMessage.style.display = "none";
    combo.style.display = "block";

    showNewCombo();
    secondsLeft = intervalSeconds;
    timerEl.textContent = "Next change in " + secondsLeft + "s";

    tickHandle = setInterval(tick, 1000);
  }

  function pauseGame() {
    running = false;
    toggleBtn.textContent = "Resume";
    toggleBtn.classList.remove("running");
    clearInterval(tickHandle);
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  }

  toggleBtn.addEventListener("click", () => {
    if (running) {
      pauseGame();
    } else {
      startGame();
    }
  });

  if (!("speechSynthesis" in window)) {
    voiceBtn.disabled = true;
    voiceBtn.classList.remove("active");
    voiceBtn.textContent = "🔇 Voice unsupported";
  } else {
    voiceBtn.addEventListener("click", () => {
      voiceEnabled = !voiceEnabled;
      voiceBtn.classList.toggle("active", voiceEnabled);
      voiceBtn.textContent = voiceEnabled ? "🔊 Voice On" : "🔇 Voice Off";
      if (!voiceEnabled) window.speechSynthesis.cancel();
    });
  }

  speedBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      speedBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      intervalSeconds = parseInt(btn.dataset.seconds, 10);
      secondsLeft = intervalSeconds;
      if (running) {
        timerEl.textContent = "Next change in " + secondsLeft + "s";
      }
    });
  });
</script>

</body>
</html>
